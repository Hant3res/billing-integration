version: '3.8'

services:
  tariff-service:
    build:
      context: .
      dockerfile: Dockerfile.tariff
    ports:
      - "5001:5001"
    networks:
      - billing-network

  invoice-service:
    build:
      context: .
      dockerfile: Dockerfile.invoice
    ports:
      - "5002:5002"
    environment:
      - TARIFF_SERVICE_URL=http://tariff-service:5001
    depends_on:
      - tariff-service
    networks:
      - billing-network

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile.payment
    ports:
      - "5003:5003"
    environment:
      - INVOICE_SERVICE_URL=http://invoice-service:5002
    depends_on:
      - invoice-service
    networks:
      - billing-network

  orchestrator-service:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    ports:
      - "5000:5000"
    environment:
      - TARIFF_SERVICE_URL=http://tariff-service:5001
      - INVOICE_SERVICE_URL=http://invoice-service:5002
      - PAYMENT_SERVICE_URL=http://payment-service:5003
    depends_on:
      - tariff-service
      - invoice-service
      - payment-service
    networks:
      - billing-network

networks:
  billing-network:
    driver: bridge
