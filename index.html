<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing System - Оформление услуг</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .tariff-card { cursor: pointer; transition: all 0.2s; }
        .tariff-card:hover { transform: translateY(-3px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .selected { background-color: #0d6efd; color: white; border-color: #0d6efd; }
        .selected .card-text, .selected .card-title { color: white; }
        .out-of-stock { opacity: 0.5; background-color: #f8d7da; cursor: not-allowed; }
        #cart { position: sticky; top: 20px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .alert-custom { animation: fadeIn 0.5s; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="row">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">📦 Доступные тарифы и услуги</h4>
                    </div>
                    <div class="card-body">
                        <div id="tariffs-loading" class="text-center py-5">
                            <div class="spinner-border text-primary"></div>
                            <p class="mt-2">Загрузка тарифов...</p>
                        </div>
                        <div id="tariffs-list" class="row g-3"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm" id="cart">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">🛒 Корзина</h5>
                    </div>
                    <div class="card-body">
                        <div id="cart-items" class="mb-3">
                            <p class="text-muted text-center">Выберите тарифы</p>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between">
                            <strong>Итого:</strong>
                            <strong id="total-price">0 ₽</strong>
                        </div>
                        <div class="mt-3">
                            <label class="form-label">Способ оплаты</label>
                            <select id="payment-method" class="form-select">
                                <option value="card">💳 Банковская карта</option>
                                <option value="sbp">🏦 СБП</option>
                                <option value="invoice">📄 Счёт</option>
                            </select>
                        </div>
                        <button id="checkout-btn" class="btn btn-success w-100 mt-3" disabled>Оформить заказ</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">📋 Статус операций</h5>
                    </div>
                    <div class="card-body" id="status-log" style="max-height: 200px; overflow-y: auto;">
                        <div class="text-muted text-center">Готов к оформлению заказа</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tariffs = [];
        let cart = []; // { id, name, price }
        
        const API_BASE = 'http://localhost:5000';
        
        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('status-log');
            const alertClass = type === 'error' ? 'alert-danger' : (type === 'success' ? 'alert-success' : 'alert-info');
            const logEntry = document.createElement('div');
            logEntry.className = `alert ${alertClass} alert-custom mb-2 py-2`;
            logEntry.innerHTML = `<small>${new Date().toLocaleTimeString()} - ${message}</small>`;
            logDiv.appendChild(logEntry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        async function loadTariffs() {
            try {
                addLog('Загрузка списка тарифов...');
                const response = await fetch(`${API_BASE}/api/tariffs`);
                if (!response.ok) throw new Error('Ошибка загрузки');
                const data = await response.json();
                tariffs = data.tariffs || [];
                renderTariffs();
                addLog(`Загружено ${tariffs.length} тарифов`, 'success');
            } catch (error) {
                addLog(`Ошибка загрузки тарифов: ${error.message}`, 'error');
                document.getElementById('tariffs-loading').innerHTML = '<div class="alert alert-danger">Не удалось загрузить тарифы. Убедитесь, что сервис запущен.</div>';
            }
        }
        
        function renderTariffs() {
            const container = document.getElementById('tariffs-list');
            const loadingDiv = document.getElementById('tariffs-loading');
            if (!tariffs.length) {
                container.innerHTML = '<div class="col-12"><div class="alert alert-warning">Нет доступных тарифов</div></div>';
                loadingDiv.style.display = 'none';
                return;
            }
            loadingDiv.style.display = 'none';
            container.innerHTML = tariffs.map(tariff => `
                <div class="col-md-6">
                    <div class="card tariff-card ${cart.some(c => c.id === tariff.id) ? 'selected' : ''} ${tariff.stock <= 0 ? 'out-of-stock' : ''}" 
                         onclick="${tariff.stock > 0 ? `toggleTariff(${tariff.id}, '${tariff.name}', ${tariff.price})` : ''}">
                        <div class="card-body">
                            <h6 class="card-title">${tariff.name}</h6>
                            <p class="card-text mb-1">💰 ${tariff.price} ₽</p>
                            <small class="text-muted">📦 Остаток: ${tariff.stock}</small>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function toggleTariff(id, name, price) {
            const index = cart.findIndex(c => c.id === id);
            if (index === -1) {
                cart.push({ id, name, price });
                addLog(`➕ Добавлен: ${name} (${price} ₽)`, 'info');
            } else {
                cart.splice(index, 1);
                addLog(`➖ Удалён: ${name}`, 'info');
            }
            updateCartUI();
            renderTariffs();
        }
        
        function updateCartUI() {
            const cartContainer = document.getElementById('cart-items');
            const checkoutBtn = document.getElementById('checkout-btn');
            
            if (cart.length === 0) {
                cartContainer.innerHTML = '<p class="text-muted text-center">Корзина пуста</p>';
                checkoutBtn.disabled = true;
                document.getElementById('total-price').innerText = '0 ₽';
                return;
            }
            
            cartContainer.innerHTML = cart.map(item => `
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span>${item.name}</span>
                    <div>
                        <span class="fw-bold">${item.price} ₽</span>
                        <button class="btn btn-sm btn-outline-danger ms-2" onclick="toggleTariff(${item.id}, '${item.name}', ${item.price})">✖</button>
                    </div>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('total-price').innerText = `${total} ₽`;
            checkoutBtn.disabled = false;
        }
        
        async function checkout() {
            if (cart.length === 0) {
                addLog('❌ Корзина пуста', 'error');
                return;
            }
            
            const clientId = Math.floor(Math.random() * 1000) + 1;
            const paymentMethod = document.getElementById('payment-method').value;
            const tariffIds = cart.map(c => c.id);
            
            addLog(`🚀 Оформление заказа для клиента #${clientId}...`);
            addLog(`📦 Тарифы: ${cart.map(c => c.name).join(', ')}`);
            addLog(`💳 Оплата: ${paymentMethod}`);
            
            try {
                const response = await fetch(`${API_BASE}/api/order/checkout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        client_id: clientId,
                        tariff_ids: tariffIds,
                        payment_method: paymentMethod
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    addLog(`✅ Заказ #${result.checkout_id} успешно оформлен! Сумма: ${result.total_amount} ₽`, 'success');
                    addLog(`🆔 Транзакция: ${result.transaction_id}`, 'success');
                    cart = [];
                    updateCartUI();
                    renderTariffs();
                } else {
                    addLog(`❌ Ошибка: ${result.error || 'Неизвестная ошибка'}`, 'error');
                    if (result.details) addLog(`📋 Детали: ${JSON.stringify(result.details)}`, 'error');
                }
            } catch (error) {
                addLog(`❌ Сетевая ошибка: ${error.message}. Убедитесь, что сервис запущен на порту 5000`, 'error');
            }
        }
        
        document.getElementById('checkout-btn').addEventListener('click', checkout);
        
        loadTariffs();
    </script>
</body>
</html>
